<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg5)"/>
  <!-- shelf -->
  <rect x="40" y="130" width="320" height="8" fill="#92400E" opacity="0.5"/>
  <rect x="40" y="210" width="320" height="8" fill="#92400E" opacity="0.5"/>
  <!-- books row 1 -->
  <g>
    <rect x="55" y="80" width="20" height="50" fill="#2563EB"/>
    <rect x="77" y="70" width="20" height="60" fill="#7C3AED"/>
    <rect x="99" y="85" width="20" height="45" fill="#06B6D4"/>
    <rect x="121" y="65" width="20" height="65" fill="#F59E0B"/>
    <rect x="143" y="78" width="20" height="52" fill="#22C55E"/>
    <rect x="165" y="72" width="20" height="58" fill="#EC4899"/>
  </g>
  <!-- stack of books -->
  <rect x="230" y="170" width="90" height="14" rx="3" fill="#2563EB"/>
  <rect x="238" y="156" width="74" height="14" rx="3" fill="#7C3AED"/>
  <rect x="246" y="142" width="58" height="14" rx="3" fill="#06B6D4"/>
  <!-- graduation cap on top -->
  <g transform="translate(275,110)">
    <polygon points="0,0 30,10 0,20 -30,10" fill="#0F172A"/>
    <rect x="-4" y="10" width="8" height="18" fill="#0F172A"/>
    <circle cx="0" cy="30" r="3" fill="#F59E0B"/>
  </g>
  <!-- second shelf books -->
  <g>
    <rect x="55" y="160" width="18" height="48" fill="#F97316"/>
    <rect x="76" y="150" width="18" height="58" fill="#06B6D4"/>
    <rect x="97" y="165" width="18" height="43" fill="#7C3AED"/>
    <rect x="118" y="155" width="18" height="53" fill="#2563EB"/>
  </g>
  <circle cx="350" cy="60" r="26" fill="#F59E0B" opacity="0.15"/>
  <circle cx="30" cy="250" r="24" fill="#2563EB" opacity="0.1"/>
</svg>
